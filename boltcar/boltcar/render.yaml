services:
  # Backend Service
  - type: web
    name: boltcar-backend
    env: node
    repo: https://github.com/Rishabh2155/Bolt.git
    rootDir: boltcar/boltcar/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        value: mongodb+srv://boltcar:boltcar9878@cluster0.je4iyip.mongodb.net/?appName=Cluster0
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_PATH
        value: ./uploads

  # Frontend Service
  - type: web
    name: boltcar-frontend
    env: static
    repo: https://github.com/Rishabh2155/Bolt.git
    rootDir: boltcar/boltcar
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://boltcar-backend-05su.onrender.com/api
